              "  (alias expansion, semicolon chaining, and quoting all apply)",
              "- Actions do not trigger on output from other actions (depth limit)",
              "- Actions are saved to your client config",
              "",
              "Removing Actions:",
              "#unaction <pattern>           Remove actions whose pattern matches",
              "#unaction *                   Remove all actions",
            ].join("\n"),
          },
        };

        const selected = helpContent[sectionName] || helpContent.aliases;
        this.helpDetailTitle.textContent = selected.title;
        this.helpDetailContent.textContent = selected.body;
        this.helpHomeView.classList.add("hidden");
        this.helpDetailView.classList.remove("hidden");
        this.helpModal.querySelector(".modal-panel").classList.add("help-wide");
      }

      openHelp(sectionName = "") {
        this.closeSettings();
        this.helpModal.classList.remove("hidden");
        this.helpModal.setAttribute("aria-hidden", "false");
        if (sectionName) {
          this.showHelpSection(sectionName);
          return;
        }
        this.showHelpHome();
      }

      closeHelp() {
        this.helpModal.classList.add("hidden");
        this.helpModal.setAttribute("aria-hidden", "true");
        this.showHelpHome();
      }

      saveConfig() {
        this.downloadClientConfig(this.configFileName);
      }

      saveConfigAs() {
        this.closeSettings();
        this.showPrompt("Save Config As", this.configFileName, (value) => {
          let fileName = String(value || "").trim() || this.configFileName;
          if (!fileName.toLowerCase().endsWith(".json")) {
            fileName += ".json";
          }
          this.configFileName = fileName;
          this.downloadClientConfig(fileName);
        });
      }

      downloadClientConfig(fileName) {
        const config = this.persistClientConfig();
        const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.URL.revokeObjectURL(url);
        this.appendSystemMessage(`Saved client config as ${fileName}.`, "bright_green");
        this.closeSettings();
      }

      requestLoadConfig(loadMode = "merge") {
        this.pendingLoadMode = loadMode;
        this.configFileInput.value = "";
        this.configFileInput.click();
      }

      requestLoadNewConfig() {
        this.pendingLoadMode = "replace";
        this.requestLoadConfig("replace");
      }

      loadConfigFromFile(event) {
        const file = event && event.target && event.target.files ? event.target.files[0] : null;
        if (!file) {
          return;
        }

        this.configFileName = file.name || "mudproto-client-config.json";
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            const mode = this.pendingLoadMode === "replace" ? "replace" : "merge";
            const currentConfig = this.buildClientConfig();
            const nextConfig = mode === "replace"
              ? this.normalizeClientConfig(parsed)
              : this.mergeClientConfig(currentConfig, parsed);

            this.aliases = nextConfig.aliases || {};
            this.keyBindings = nextConfig.key_bindings || {};
            this.loadActions(nextConfig.actions || []);
            this.loadOptions(nextConfig.options || {});
            this.serverUriEl.value = nextConfig.server_uri;
            this.persistClientConfig();
            this.appendSystemMessage(
              mode === "replace"
                ? "Loaded new client config. Reconnect to apply any server change."
                : "Loaded client config and merged it into current settings. Reconnect to apply any server change.",
              "bright_green"
            );
            this.closeSettings();
          } catch {
            this.appendSystemMessage("Failed to load client config.", "bright_red");
          } finally {
            this.pendingLoadMode = "merge";
          }
        };
        reader.readAsText(file);
      }

      onGlobalKeyDown(event) {
        if (event.defaultPrevented) {
          return;
        }

        if (event.key === "Escape") {
          if (this.aliasesModal && !this.aliasesModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeAliasesModal();
            this.openSettings();
            return;
          }
          if (this.bindingsModal && !this.bindingsModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeBindingsModal();
            this.openSettings();
            return;
          }
          if (this.optionsModal && !this.optionsModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeOptionsModal();
            this.openSettings();
            return;
          }
          if (this.actionsModal && !this.actionsModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeActionsModal();
            this.openSettings();
            return;
          }
          if (this.helpModal && !this.helpModal.classList.contains("hidden")) {
            event.preventDefault();
            if (!this.helpDetailView.classList.contains("hidden")) {
              this.showHelpHome();
            } else {
              this.closeHelp();
            }
            return;
          }
          if (this.settingsModal && !this.settingsModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeSettings();
            return;
          }
        }

        if (this.tryExecuteBoundKey(event)) {
          return;
        }

        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.tagName === "SELECT")) {
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          this.inputEl.focus();
          return;
        }

        if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
          this.inputEl.focus();
          this.inputEl.value += event.key;
          event.preventDefault();
        }
      }

      tryExecuteBoundKey(event) {
        if (event.ctrlKey || event.metaKey || event.altKey) {
          return false;
        }
        if ((this.helpModal && !this.helpModal.classList.contains("hidden")) || (this.settingsModal && !this.settingsModal.classList.contains("hidden")) || (this.aliasesModal && !this.aliasesModal.classList.contains("hidden")) || (this.bindingsModal && !this.bindingsModal.classList.contains("hidden"))) {
          return false;
        }

        const normalizedKey = bindEventKeyName(event);
        if (!normalizedKey || normalizedKey === "f1") {
          return false;
        }

        const expansion = this.keyBindings[normalizedKey];
        if (!expansion) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        this.executeCommandLine(stripOuterBraces(expansion), { depth: 0 });
        return true;
      }

      collectReferencedAliasPosition(template) {
        const matches = String(template || "").match(/%([1-9])/g) || [];
        return matches.reduce((highest, match) => Math.max(highest, Number(match.slice(1))), 0);
      }

      resolveAliasExpansion(template, remainderText) {
        const expansion = stripOuterBraces(template);
        const remainder = String(remainderText || "").trim();
        const args = parseCommandWords(remainder);
        const highestReferenced = this.collectReferencedAliasPosition(expansion);
        const remainingText = highestReferenced > 0 ? args.slice(highestReferenced).join(" ") : remainder;

        return String(expansion || "").replace(/%-([1-9])|%([0-9r])/gi, (_match, rangeToken, token) => {
          if (rangeToken) {
            const fromIndex = Number(rangeToken) - 1;
            return args.slice(fromIndex).join(" ");
          }
          const lowered = String(token).toLowerCase();
          if (lowered === "0") {
            return remainder;
          }
          if (lowered === "r") {
            return remainingText;
          }
          const index = Number(lowered) - 1;
          return index >= 0 ? (args[index] || "") : "";
        });
      }

      applyAliasExpansion(command, depth = 0) {
        const normalizedCommand = String(command || "").trim().toLowerCase();
        const aliasKeys = Object.keys(this.aliases).sort((a, b) => b.length - a.length);
        for (const aliasKey of aliasKeys) {
          if (!normalizedCommand.startsWith(aliasKey)) {
            continue;
          }
          const charAfter = command.charAt(aliasKey.length);
          if (charAfter && !/\s/.test(charAfter)) {
            continue;
          }
          const remainder = command.slice(aliasKey.length).trim();
          const expansion = this.aliases[aliasKey];
          if (depth >= MAX_ALIAS_EXPANSION_DEPTH) {
            this.appendSystemMessage("Alias recursion depth exceeded.", "bright_red");
            return true;
          }
          const resolved = this.resolveAliasExpansion(expansion, remainder);
          this.executeCommandLine(resolved, { depth: depth + 1 });
          return true;
        }
        return false;
      }

      matchingEntries(mapping, pattern = "") {
        const entries = Object.entries(mapping || {}).sort(([left], [right]) => left.localeCompare(right));
        const trimmedPattern = String(pattern || "").trim().toLowerCase();
        if (!trimmedPattern) {
          return entries;
        }
        const matcher = wildcardToRegExp(trimmedPattern);
        return entries.filter(([name]) => matcher.test(name));
      }

      showMappingList(mapping, pattern, emptyMessage, header) {
        const entries = this.matchingEntries(mapping, pattern);
        if (!entries.length) {
          this.appendSystemMessage(emptyMessage, "bright_yellow");
          return;
        }
        const lines = entries.map(([name, expansion]) => `  ${name} = ${expansion}`);
        this.appendSystemMessage(`${header}\n${lines.join("\n")}`, "bright_cyan");
      }

      handleAliasCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.showMappingList(this.aliases, "", "No aliases defined.", "-- Aliases --");
          return;
        }

        const { commandName: aliasName, remainder: expansion } = splitLeadingToken(remainder);
        if (!aliasName) {
          this.appendSystemMessage("Invalid alias name.", "bright_yellow");
          return;
        }

        if (!expansion) {
          this.showMappingList(this.aliases, aliasName, `No aliases match ${aliasName}.`, "-- Aliases --");
          return;
        }

        const normalizedName = String(aliasName).trim().toLowerCase();
        if (!normalizedName || normalizedName.startsWith("#")) {
          this.appendSystemMessage("Invalid alias name.", "bright_yellow");
          return;
        }

        this.aliases[normalizedName] = expansion.trim();
        this.persistClientConfig();
        this.appendSystemMessage(`${normalizedName} = ${this.aliases[normalizedName]}`, "bright_green");
      }

      handleUnaliasCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.appendSystemMessage("Usage: #unalias <name or pattern>", "bright_yellow");
          return;
        }
        const pattern = remainder.trim().toLowerCase();
        const removed = this.matchingEntries(this.aliases, pattern);
        if (!removed.length) {
          this.appendSystemMessage(`No aliases match ${pattern}.`, "bright_yellow");
          return;
        }
        for (const [name] of removed) {
          delete this.aliases[name];
        }
        this.persistClientConfig();
        this.appendSystemMessage(`Removed ${removed.length} alias${removed.length > 1 ? "es" : ""}: ${removed.map(([n]) => n).join(", ")}`, "bright_green");
      }

      handleBindCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.showMappingList(this.keyBindings, "", "No binds defined.", "-- Key Bindings --");
          return;
        }

        const { commandName: rawKeyName, remainder: expansion } = splitLeadingToken(remainder);
        if (!rawKeyName) {
          this.appendSystemMessage("Invalid key name.", "bright_yellow");
          return;
        }

        if (!expansion) {
          this.showMappingList(this.keyBindings, rawKeyName, `No binds match ${rawKeyName}.`, "-- Key Bindings --");
          return;
        }

        const normalizedKey = normalizeBindKeyName(rawKeyName);
        if (String(rawKeyName).trim().toLowerCase() === "f1") {
          this.appendSystemMessage("Reserved key: f1 cannot be rebound.", "bright_yellow");
          return;
        }
        if (!normalizedKey) {
          this.appendSystemMessage("Invalid key name.", "bright_yellow");
          return;
        }

        this.keyBindings[normalizedKey] = expansion.trim();
        this.persistClientConfig();
        this.appendSystemMessage(`${normalizedKey} = ${this.keyBindings[normalizedKey]}`, "bright_green");
      }

      handleUnbindCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.appendSystemMessage("Usage: #unbind <key or pattern>", "bright_yellow");
          return;
        }
        const pattern = remainder.trim().toLowerCase();
        const removed = this.matchingEntries(this.keyBindings, pattern);
        if (!removed.length) {
          this.appendSystemMessage(`No binds match ${pattern}.`, "bright_yellow");
          return;
        }
        for (const [name] of removed) {
          delete this.keyBindings[name];
        }
        this.persistClientConfig();
        this.appendSystemMessage(`Removed ${removed.length} bind${removed.length > 1 ? "s" : ""}: ${removed.map(([n]) => n).join(", ")}`, "bright_green");
      }

      executeCommandLine(rawText, { depth = 0 } = {}) {
        let segments;
        try {
          segments = splitCommandLine(rawText);
        } catch (error) {
          this.appendSystemMessage(error instanceof Error ? error.message : "Malformed input.", "bright_yellow");
          return;
        }

        for (let index = 0; index < segments.length; index += 1) {
          let commandText = segments[index];
          const { commandName, remainder } = splitLeadingToken(commandText);
          const localCommand = this.resolveLocalCommand(commandName);

          if ((localCommand === "#alias" || localCommand === "#bind" || localCommand === "#action") && index < segments.length - 1) {
            try {
              if (parseCommandWords(remainder).length >= 2) {
                commandText = segments.slice(index).join(";");
                this.dispatchCommand(commandText, depth);
                break;
              }
            } catch (error) {
              this.appendSystemMessage(error instanceof Error ? error.message : "Malformed input.", "bright_yellow");
              return;
            }
          }

          this.dispatchCommand(commandText, depth);
        }
      }

      resolveLocalCommand(input) {
        const commands = ["#alias", "#unalias", "#bind", "#unbind", "#action", "#unaction", "#clear", "#quit", "#help"];
        const lowered = String(input || "").trim().toLowerCase();
        if (!lowered.startsWith("#")) {
          return lowered;
        }
        const exact = commands.find((cmd) => cmd === lowered);
        if (exact) {
          return exact;
        }
        const matches = commands.filter((cmd) => cmd.startsWith(lowered));
        return matches.length === 1 ? matches[0] : lowered;
      }

      dispatchCommand(commandText, depth = 0) {
        const normalizedText = String(commandText || "").trim();
        if (!normalizedText) {
          return;
        }

        const { commandName } = splitLeadingToken(normalizedText);
        const localCommand = this.resolveLocalCommand(commandName);

        if (localCommand === "#clear") {
          this.clearOutput();
          return;
        }

        if (localCommand === "#quit") {
          this.appendSystemMessage("Disconnected locally.", "bright_yellow");
          this.disconnect(true);
          return;
        }

        if (localCommand === "#help") {
          this.openHelp();
          return;
        }

        if (localCommand === "#alias") {
          this.handleAliasCommand(commandText);
          return;
        }

        if (localCommand === "#bind") {
          this.handleBindCommand(commandText);
          return;
        }

        if (localCommand === "#unalias") {
          this.handleUnaliasCommand(commandText);
          return;
        }

        if (localCommand === "#unbind") {
          this.handleUnbindCommand(commandText);
          return;
        }

        if (localCommand === "#action") {
          this.handleActionCommand(commandText);
          return;
        }

        if (localCommand === "#unaction") {
          this.handleUnactionCommand(commandText);
          return;
        }

        if (localCommand.startsWith("#")) {
          this.appendSystemMessage("Unknown local command. Available: #alias, #unalias, #bind, #unbind, #action, #unaction, #clear, #quit, #help.", "bright_yellow");
          return;
        }

        if (this.applyAliasExpansion(normalizedText, depth)) {
          return;
        }

        this.sendText(normalizedText);
      }

      openAliasesModal() {
        this.closeSettings();
        this.aliasNameInput.value = "";
        this.aliasExpansionInput.value = "";
        this.renderAliasesList();
        this.aliasesModal.classList.remove("hidden");
        this.aliasesModal.setAttribute("aria-hidden", "false");
        this.aliasNameInput.focus();
      }

      closeAliasesModal() {
        this.aliasesModal.classList.add("hidden");
        this.aliasesModal.setAttribute("aria-hidden", "true");
      }

      renderAliasesList() {
        const entries = Object.entries(this.aliases).sort(([a], [b]) => a.localeCompare(b));
        if (!entries.length) {
          this.aliasesList.innerHTML = '<div class="mapping-empty">No aliases defined.</div>';
          return;
        }
        this.aliasesList.innerHTML = entries.map(([name, expansion]) => {
          const safeName = this.escapeHtml(name);
          const safeExpansion = this.escapeHtml(expansion);
          return `<div class="mapping-row"><span class="mapping-key" title="${safeName}">${safeName}</span><span class="mapping-eq">=</span><span class="mapping-val" title="${safeExpansion}">${safeExpansion}</span><button class="mapping-del" type="button" data-name="${safeName}" aria-label="Delete alias ${safeName}">✕</button></div>`;
        }).join("");
        this.aliasesList.querySelectorAll(".mapping-del").forEach((btn) => {
          btn.addEventListener("click", () => {
            const name = btn.getAttribute("data-name");
            delete this.aliases[name];
            this.persistClientConfig();
            this.renderAliasesList();
          });
        });
        this.aliasesList.querySelectorAll(".mapping-row").forEach((row) => {
          const nameEl = row.querySelector(".mapping-key");
          const valEl = row.querySelector(".mapping-val");
          row.addEventListener("click", (event) => {
            if (event.target.classList.contains("mapping-del")) { return; }
            this.aliasNameInput.value = nameEl.textContent;
            this.aliasExpansionInput.value = valEl.textContent;
            this.aliasExpansionInput.focus();
          });
        });
      }

      submitAliasForm() {
        const rawName = this.aliasNameInput.value.trim().toLowerCase();
        const expansion = this.aliasExpansionInput.value.trim();
        if (!rawName || rawName.startsWith("#")) {
          this.aliasNameInput.focus();
          return;
        }
        if (!expansion) {
          this.aliasExpansionInput.focus();
          return;
        }
        this.aliases[rawName] = expansion;
        this.persistClientConfig();
        this.aliasNameInput.value = "";
        this.aliasExpansionInput.value = "";
        this.renderAliasesList();
        this.aliasNameInput.focus();
      }

      openKeyBindingsModal() {
        this.closeSettings();
        this.populateBindKeyOptions();
        this.bindKeyInput.value = "";
        this.bindExpansionInput.value = "";
        this.renderBindingsList();
        this.bindingsModal.classList.remove("hidden");
        this.bindingsModal.setAttribute("aria-hidden", "false");
        this.bindKeyInput.focus();
      }

      populateBindKeyOptions() {
        const current = this.bindKeyInput.value;
        const keys = [...SUPPORTED_BIND_KEYS].filter((k) => k !== "f1").sort();
        this.bindKeyInput.innerHTML = '<option value="">-- select --</option>' +
          keys.map((k) => `<option value="${k}">${k}</option>`).join("");
        this.bindKeyInput.value = current || "";
      }

      closeBindingsModal() {
        this.bindingsModal.classList.add("hidden");
        this.bindingsModal.setAttribute("aria-hidden", "true");
      }

      renderBindingsList() {
        const entries = Object.entries(this.keyBindings).sort(([a], [b]) => a.localeCompare(b));
        if (!entries.length) {
          this.bindingsList.innerHTML = '<div class="mapping-empty">No key bindings defined.</div>';
          return;
        }
        this.bindingsList.innerHTML = entries.map(([key, expansion]) => {
          const safeKey = this.escapeHtml(key);
          const safeExpansion = this.escapeHtml(expansion);
          return `<div class="mapping-row"><span class="mapping-key" title="${safeKey}">${safeKey}</span><span class="mapping-eq">=</span><span class="mapping-val" title="${safeExpansion}">${safeExpansion}</span><button class="mapping-del" type="button" data-name="${safeKey}" aria-label="Delete binding ${safeKey}">✕</button></div>`;
        }).join("");
        this.bindingsList.querySelectorAll(".mapping-del").forEach((btn) => {
          btn.addEventListener("click", () => {
            const key = btn.getAttribute("data-name");
            delete this.keyBindings[key];
            this.persistClientConfig();
            this.renderBindingsList();
          });
        });
        this.bindingsList.querySelectorAll(".mapping-row").forEach((row) => {
          const keyEl = row.querySelector(".mapping-key");
          const valEl = row.querySelector(".mapping-val");
          row.addEventListener("click", (event) => {
            if (event.target.classList.contains("mapping-del")) { return; }
            this.bindKeyInput.value = keyEl.textContent;
            this.bindExpansionInput.value = valEl.textContent;
            this.bindExpansionInput.focus();
          });
        });
      }

      submitBindForm() {
        const selectedKey = this.bindKeyInput.value;
        if (!selectedKey) {
          this.bindKeyInput.focus();
          return;
        }
        const expansion = this.bindExpansionInput.value.trim();
        if (!expansion) {
          this.bindExpansionInput.focus();
          return;
        }
        this.keyBindings[selectedKey] = expansion;
        this.persistClientConfig();
        this.bindKeyInput.value = "";
        this.bindExpansionInput.value = "";
        this.renderBindingsList();
        this.bindKeyInput.focus();
      }

      normalizeActionsArray(raw) {
        if (!Array.isArray(raw)) {
          return [];
        }
        return raw.filter((entry) => {
          if (!entry || typeof entry !== "object") { return false; }
          const pattern = String(entry.pattern || "").trim();
          const expansion = String(entry.expansion || "").trim();
          return pattern && expansion;
        }).map((entry) => ({
          pattern: String(entry.pattern).trim(),
          expansion: String(entry.expansion).trim(),
          priority: Math.max(0, Math.min(9, Number(entry.priority) || 5)),
        }));
      }

      mergeActionsArrays(currentActions, incomingActions) {
        const existing = new Set(currentActions.map((a) => `${a.pattern}\x00${a.expansion}\x00${a.priority}`));
        const merged = [...currentActions];
        for (const action of incomingActions) {
          const key = `${action.pattern}\x00${action.expansion}\x00${action.priority}`;
          if (!existing.has(key)) {
            merged.push(action);
            existing.add(key);
          }
        }
        return merged;
      }

      loadActions(actionsArray) {
        this.actions = [];
        this.actionIdCounter = 0;
        const normalized = this.normalizeActionsArray(actionsArray);
        for (const entry of normalized) {
          this.actions.push({
            pattern: entry.pattern,
            expansion: entry.expansion,
            priority: entry.priority,
            anchored: entry.pattern.startsWith("^"),
            id: this.actionIdCounter++,
          });
        }
        this.sortActions();
      }

      sortActions() {
        this.actions.sort((a, b) => a.priority - b.priority || a.id - b.id);
      }

      normalizeOptions(raw) {
        const data = raw && typeof raw === "object" ? raw : {};
        return {
          echo_commands: data.echo_commands !== false,
          echo_action_commands: data.echo_action_commands !== false,
        };
      }

      loadOptions(raw) {
        this.options = this.normalizeOptions(raw);
        this.optEchoCommands.checked = this.options.echo_commands;
        this.optEchoActionCommands.checked = this.options.echo_action_commands;
      }

      openOptionsModal() {
        this.closeSettings();
        this.optEchoCommands.checked = this.options.echo_commands;
        this.optEchoActionCommands.checked = this.options.echo_action_commands;
        this.optionsModal.classList.remove("hidden");
        this.optionsModal.setAttribute("aria-hidden", "false");
      }

      closeOptionsModal() {
        this.optionsModal.classList.add("hidden");
        this.optionsModal.setAttribute("aria-hidden", "true");
      }

      addAction(pattern, expansion, priority) {
        const existing = this.actions.find(
          (a) => a.pattern === pattern && a.expansion === expansion && a.priority === priority
        );
        if (existing) {
          return existing;
        }
        const action = {
          pattern,
          expansion,
          priority,
          anchored: pattern.startsWith("^"),
          id: this.actionIdCounter++,
        };
        this.actions.push(action);
        this.sortActions();
        return action;
      }

      removeActionsMatching(searchPattern) {
        const trimmed = searchPattern.trim().toLowerCase();
        if (!trimmed) {
          return [];
        }
        const matcher = wildcardToRegExp(trimmed);
        const removed = this.actions.filter((a) => matcher.test(a.pattern.toLowerCase()));
        this.actions = this.actions.filter((a) => !matcher.test(a.pattern.toLowerCase()));
        return removed;
      }

      handleActionCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.showActionList("");
          return;
        }

        const { commandName: patternToken, remainder: afterPattern } = splitLeadingToken(remainder);
        if (!patternToken) {
          this.showActionList("");
          return;
        }

        if (!afterPattern) {
          this.showActionList(patternToken);
          return;
        }

        const { commandName: expansionToken, remainder: afterExpansion } = splitLeadingToken(afterPattern);
        if (!expansionToken) {
          this.showActionList(patternToken);
          return;
        }

        const priorityStr = afterExpansion ? afterExpansion.trim() : "";
        const priority = priorityStr ? Math.max(0, Math.min(9, Number(priorityStr) || 5)) : 5;
        const pattern = patternToken.trim();
        const expansion = expansionToken.trim();

        this.addAction(pattern, expansion, priority);
        this.persistClientConfig();
        this.appendSystemMessage(`[${priority}] ${pattern} => ${expansion}`, "bright_green");
      }

      handleUnactionCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.appendSystemMessage("Usage: #unaction <pattern>", "bright_yellow");
          return;
        }
        const removed = this.removeActionsMatching(remainder);
        if (!removed.length) {
          this.appendSystemMessage(`No actions match ${remainder.trim()}.`, "bright_yellow");
          return;
        }
        this.persistClientConfig();
        this.appendSystemMessage(`Removed ${removed.length} action${removed.length > 1 ? "s" : ""}.`, "bright_green");
      }

      showActionList(searchPattern) {
        const trimmed = String(searchPattern || "").trim().toLowerCase();
        let entries = this.actions;
        if (trimmed) {
          const matcher = wildcardToRegExp(trimmed);
          entries = entries.filter((a) => matcher.test(a.pattern.toLowerCase()));
        }
        if (!entries.length) {
          this.appendSystemMessage(trimmed ? `No actions match ${searchPattern.trim()}.` : "No actions defined.", "bright_yellow");
          return;
        }
        const lines = entries.map((a) => `  [${a.priority}] ${a.pattern} => ${a.expansion}`);
        this.appendSystemMessage(`-- Actions --\n${lines.join("\n")}`, "bright_cyan");
      }

      resolveActionExpansion(template, lineText) {
        const expansion = stripOuterBraces(template);
        const words = parseCommandWords(lineText);
        return String(expansion || "").replace(/%-([1-9])|%([0-9r])/gi, (_match, rangeToken, token) => {
          if (rangeToken) {
            const fromIndex = Number(rangeToken) - 1;
            return words.slice(fromIndex).join(" ");
          }
          const lowered = String(token).toLowerCase();
          if (lowered === "0") {
            return lineText;
          }
          if (lowered === "r") {
            return words.slice(1).join(" ");
          }
          const index = Number(lowered) - 1;
          return index >= 0 ? (words[index] || "") : "";
        });
      }

      collectActionEchoes(lineText) {
        const results = [];
        if (this.actionFiringDepth >= MAX_ACTION_FIRE_DEPTH) {
          return results;
        }
        if (!this.actions.length) {
          return results;
        }
        const text = String(lineText || "");
        if (!text) {
          return results;
        }
        const textLower = text.toLowerCase();
        for (const action of this.actions) {
          const patternText = action.anchored ? action.pattern.slice(1) : action.pattern;
          const patternLower = patternText.toLowerCase();
          let matched = false;
          if (action.anchored) {
            matched = textLower.startsWith(patternLower);
          } else {
            matched = textLower.includes(patternLower);
          }
          if (matched) {
            const resolved = this.resolveActionExpansion(action.expansion, text);
            results.push(resolved);
          }
        }
        return results;
      }

      openActionsModal() {
        this.closeSettings();
        this.actionPatternInput.value = "";
        this.actionExpansionInput.value = "";
        this.actionPriorityInput.value = "5";
        this.renderActionsList();
        this.actionsModal.classList.remove("hidden");
        this.actionsModal.setAttribute("aria-hidden", "false");
        this.actionPatternInput.focus();
      }

      closeActionsModal() {
        this.actionsModal.classList.add("hidden");
        this.actionsModal.setAttribute("aria-hidden", "true");
      }

      renderActionsList() {
        if (!this.actions.length) {
          this.actionsList.innerHTML = '<div class="mapping-empty">No actions defined.</div>';
          return;
        }
        this.actionsList.innerHTML = this.actions.map((action, index) => {
          const safePattern = this.escapeHtml(action.pattern);
          const safeExpansion = this.escapeHtml(action.expansion);
          return `<div class="mapping-row"><span class="mapping-key" title="${safePattern}">[${action.priority}] ${safePattern}</span><span class="mapping-eq">=</span><span class="mapping-val" title="${safeExpansion}">${safeExpansion}</span><button class="mapping-del" type="button" data-index="${index}" aria-label="Delete action ${safePattern}">✕</button></div>`;
        }).join("");
        this.actionsList.querySelectorAll(".mapping-del").forEach((btn) => {
          btn.addEventListener("click", () => {
            const idx = Number(btn.getAttribute("data-index"));
            if (idx >= 0 && idx < this.actions.length) {
              this.actions.splice(idx, 1);
              this.persistClientConfig();
              this.renderActionsList();
            }
          });
        });
        this.actionsList.querySelectorAll(".mapping-row").forEach((row, index) => {
          row.addEventListener("click", (event) => {
            if (event.target.classList.contains("mapping-del")) { return; }
            const action = this.actions[index];
            if (action) {
              this.actionPatternInput.value = action.pattern;
              this.actionExpansionInput.value = action.expansion;
              this.actionPriorityInput.value = String(action.priority);
              this.actionExpansionInput.focus();
            }
          });
        });
      }

      submitActionForm() {
        const pattern = this.actionPatternInput.value.trim();
        if (!pattern) {
          this.actionPatternInput.focus();
          return;
        }
        const expansion = this.actionExpansionInput.value.trim();
        if (!expansion) {
          this.actionExpansionInput.focus();
          return;
        }
        const priority = Math.max(0, Math.min(9, Number(this.actionPriorityInput.value) || 5));
        this.addAction(pattern, expansion, priority);
        this.persistClientConfig();
        this.actionPatternInput.value = "";
        this.actionExpansionInput.value = "";
        this.actionPriorityInput.value = "5";
        this.renderActionsList();
        this.actionPatternInput.focus();
      }

      escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      setStatus(text, state) {
        this.statusEl.textContent = text;
        this.statusEl.className = `status ${state}`;

        if (this.connectionBtn) {
          this.connectionBtn.textContent = state === "connected" || state === "connecting" ? "Disconnect" : "Connect";
        }
      }

      focusInput() {
        this.inputEl.focus();
        this.inputEl.selectionStart = this.inputEl.selectionEnd = this.inputEl.value.length;
      }

      toggleConnection() {
        if (this.websocket || this.connecting) {
          this.appendSystemMessage("Disconnected locally.", "bright_yellow");
          this.disconnect(true);
          return;
        }

        this.appendSystemMessage(`Connecting to ${this.currentUri()}...`, "bright_cyan");
        this.connect();
      }

      cancelReconnect() {
        if (this.reconnectTimer !== null) {
          window.clearTimeout(this.reconnectTimer);
          this.reconnectTimer = null;
        }
      }

      scheduleReconnect() {
        if (this.closing || this.websocket || this.connecting || this.reconnectTimer !== null) {
          return;
        }

        this.appendSystemMessage("Connection lost. Reconnecting in 5 seconds...", "bright_yellow");
        this.reconnectTimer = window.setTimeout(() => {
          this.reconnectTimer = null;
          this.appendSystemMessage(`Reconnecting to ${this.currentUri()}...`, "bright_cyan");
          this.connect();
        }, RECONNECT_INTERVAL_MS);
      }

      connect() {
        if (this.websocket || this.connecting) {
          return;
        }

        const uri = this.currentUri();
        this.closing = false;
        this.connecting = true;
        this.cancelReconnect();
        this.setStatus("Connecting", "connecting");

        try {
          const websocket = new WebSocket(uri);
          this.websocket = websocket;

          websocket.addEventListener("open", () => {
            this.connecting = false;
            this.setStatus("Connected", "connected");
            this.appendSystemMessage(`Connected to ${uri}`, "bright_green");
            this.focusInput();
          });

          websocket.addEventListener("message", (event) => {
            let response;
            try {
              response = JSON.parse(event.data);
            } catch {
              return;
            }

            if (response && response.type === "display") {
              renderDisplayMessage(this, response);
            }
          });

          websocket.addEventListener("close", () => {
            this.websocket = null;
            this.connecting = false;
            this.setStatus("Disconnected", "disconnected");
            if (!this.closing) {
              this.scheduleReconnect();
            }
          });

          websocket.addEventListener("error", () => {
            this.appendSystemMessage(
              "Connection error. If using WSS with a self-signed certificate, trust the certificate in your browser first.",
              "bright_red"
            );
          });
        } catch (error) {
          this.websocket = null;
          this.connecting = false;
          this.setStatus("Disconnected", "disconnected");
          this.appendSystemMessage(`Connection error: ${error}`, "bright_red");
        }
      }

      disconnect(manual = false) {
        this.cancelReconnect();
        this.closing = manual;

        if (this.websocket) {
          this.websocket.close();
          this.websocket = null;
        }

        this.connecting = false;
        this.setStatus("Disconnected", "disconnected");
      }

      sendText(text) {
        if (!this.websocket || this.websocket.readyState !== WebSocket.OPEN) {
          this.appendSystemMessage("Not connected to server.", "bright_red");
          return;
        }

        if (this.options.echo_commands && this.actionFiringDepth === 0) {
          this.appendInlineEcho(` ${text}`);
        }
        this.websocket.send(JSON.stringify(buildInputMessage(text)));
      }

      onSubmit(event) {
        event.preventDefault();

        const rawText = this.inputEl.value;
        const normalizedText = rawText.trim();
        this.inputEl.value = "";

        if (normalizedText) {
          this.recordHistory(normalizedText);
          this.executeCommandLine(rawText, { depth: 0 });
        }

        this.focusInput();
      }

      onHistoryKey(event) {
        if (this.tryExecuteBoundKey(event)) {
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          this.onHistoryUp();
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          this.onHistoryDown();
        }
      }

      onHistoryUp() {
        if (!this.commandHistory.length) {
          return;
        }

        if (this.historyIndex === null) {
          this.historyStash = this.inputEl.value;
          this.historyIndex = this.commandHistory.length - 1;
        } else if (this.historyIndex > 0) {
          this.historyIndex -= 1;
        }

        this.inputEl.value = this.commandHistory[this.historyIndex];
        this.focusInput();
      }

      onHistoryDown() {
        if (this.historyIndex === null) {
          return;
        }

        if (this.historyIndex < this.commandHistory.length - 1) {
          this.historyIndex += 1;
          this.inputEl.value = this.commandHistory[this.historyIndex];
        } else {
          this.historyIndex = null;
          this.inputEl.value = this.historyStash;
        }

        this.focusInput();
      }

      recordHistory(command) {
        if (!this.commandHistory.length || this.commandHistory[this.commandHistory.length - 1] !== command) {
          this.commandHistory.push(command);
          if (this.commandHistory.length > MAX_COMMAND_HISTORY) {
            this.commandHistory.splice(0, this.commandHistory.length - MAX_COMMAND_HISTORY);
          }
        }
        this.historyIndex = null;
        this.historyStash = "";
      }

      isNearBottom() {
        const remaining = this.outputEl.scrollHeight - this.outputEl.scrollTop - this.outputEl.clientHeight;
        return remaining <= this.autoScrollThresholdPx;
      }

      pruneOutput() {
        while (this.outputEl.childElementCount > MAX_OUTPUT_GROUPS) {
          this.outputEl.firstElementChild?.remove();
        }
      }

      appendInlineEcho(text) {
        const span = document.createElement("span");
        span.textContent = text;
        span.style.color = COLOR_MAP.bright_black;
        this.outputEl.appendChild(span);
        if (this.isNearBottom()) {
          this.outputEl.scrollTop = this.outputEl.scrollHeight;
        }
      }

      appendPart(fragment, part) {
        if (!part || typeof part !== "object") {
          return;
        }

        const text = String(part.text || "");
        if (!text) {
          return;
        }

        const span = document.createElement("span");
        const fg = typeof part.fg === "string" ? part.fg : "bright_white";
        span.textContent = text;
        span.style.color = COLOR_MAP[fg] || COLOR_MAP.bright_white;
        if (part.bold) {
          span.style.fontWeight = "700";
        }
        fragment.appendChild(span);
      }

      flushRenderQueue() {
        this.renderScheduled = false;
        if (!this.renderQueue.length) {
          return;
        }

        const shouldStickToBottom = this.isNearBottom();
        const fragment = document.createDocumentFragment();

        while (this.renderQueue.length) {
          const queuedLines = this.renderQueue.shift();
          if (!Array.isArray(queuedLines) || !queuedLines.length) {
            continue;
          }

          const lines = this.normalizeBoundarySpacing(queuedLines);
          if (!lines.length) {
            continue;
          }

          const group = document.createElement("span");
          group.className = "output-group";

          if (!this.outputEndsWithNewline) {
            group.appendChild(document.createTextNode("\n"));
          }

          lines.forEach((line, index) => {
            if (index > 0) {
              group.appendChild(document.createTextNode("\n"));
            }
            if (!Array.isArray(line)) {
              return;
            }
            line.forEach((part) => this.appendPart(group, part));
          });

          this.outputEndsWithNewline = Array.isArray(lines[lines.length - 1]) && lines[lines.length - 1].length === 0;
          this.trailingBlankLineCount = this.countTrailingBlankLines(lines);
          this.hasRenderedOutput = true;
          fragment.appendChild(group);
        }

        this.outputEl.appendChild(fragment);
        this.pruneOutput();
        if (shouldStickToBottom) {
          this.outputEl.scrollTop = this.outputEl.scrollHeight;
        }
      }

      countLeadingBlankLines(lines) {
        let count = 0;
        while (count < lines.length && Array.isArray(lines[count]) && lines[count].length === 0) {
          count += 1;
        }
        return count;
      }

      countTrailingBlankLines(lines) {
        let count = 0;
        for (let index = lines.length - 1; index >= 0; index -= 1) {
          if (Array.isArray(lines[index]) && lines[index].length === 0) {
            count += 1;
            continue;
          }
          break;
        }
        return count;
      }

      normalizeBoundarySpacing(lines) {
        if (!Array.isArray(lines)) {
          return [];
        }

        const normalizedLines = [...lines];
        const leadingBlankCount = this.countLeadingBlankLines(lines);
        if (!leadingBlankCount) {
          return normalizedLines;
        }

        if (!this.hasRenderedOutput) {
          normalizedLines.splice(0, leadingBlankCount);
          return normalizedLines;
        }

        const desiredLeadingBlankCount = !this.outputEndsWithNewline || this.trailingBlankLineCount < 2 ? 1 : 0;
        if (leadingBlankCount > desiredLeadingBlankCount) {
          normalizedLines.splice(0, leadingBlankCount - desiredLeadingBlankCount);
        }

        return normalizedLines;
      }

      appendLineGroup(lines) {
        if (!Array.isArray(lines) || !lines.length) {
          return;
        }

        this.renderQueue.push(lines);
        if (this.renderQueue.length > MAX_RENDER_QUEUE_GROUPS) {
          this.renderQueue.splice(0, this.renderQueue.length - MAX_RENDER_QUEUE_GROUPS);
        }
        if (this.renderScheduled) {
          return;
        }

        this.renderScheduled = true;
        window.requestAnimationFrame(() => this.flushRenderQueue());
      }

      appendSystemMessage(text, fg = "bright_white") {
        const lines = [];
        if (!this.outputEndsWithNewline) {
          lines.push([]);
        }
        const textLines = String(text).split("\n");
        for (const textLine of textLines) {
          if (textLine === "") {
            lines.push([]);
          } else {
            lines.push([{ text: textLine, fg, bold: false }]);
          }
        }
        lines.push([]);
        lines.push([]);
        this.appendLineGroup(lines);
      }

      renderDisplayMessage(message) {
        const payload = message && typeof message === "object" ? message.payload : null;
        if (!payload || typeof payload !== "object") {
          return;
        }

        const lines = extractLines(payload, "lines");
        const promptLines = extractLines(payload, "prompt_lines");
        const renderedLines = [];

        if (lines.length) {
          renderedLines.push(...lines);
        }
        if (promptLines.length) {
          renderedLines.push(...promptLines);
        }
        if (!renderedLines.length) {
          return;
        }

        if (!this.actions.length) {
          this.appendLineGroup(renderedLines);
          return;
        }

        const deferredActions = [];
        for (const line of renderedLines) {
          const lineText = Array.isArray(line)
            ? line.map((span) => (span && typeof span === "object" ? span.text || "" : "")).join("")
            : "";
          if (lineText) {
            const resolved = this.collectActionEchoes(lineText);
            if (resolved.length) {
              deferredActions.push({ afterLine: line, resolved });
            }
          }
        }

        if (!deferredActions.length) {
          this.appendLineGroup(renderedLines);
        } else {
          const augmentedLines = [];
          for (const line of renderedLines) {
            augmentedLines.push(line);
            const entry = deferredActions.find((d) => d.afterLine === line);
            if (entry && this.options.echo_action_commands) {
              for (const cmd of entry.resolved) {
                const lastLine = augmentedLines[augmentedLines.length - 1];
                if (Array.isArray(lastLine)) {
                  lastLine.push({ text: `  [action] ${cmd}`, fg: "bright_black", bold: false });
                }
              }
            }
          }
          this.appendLineGroup(augmentedLines);
        }

        this.actionFiringDepth += 1;
        try {
          for (const entry of deferredActions) {
            for (const cmd of entry.resolved) {
              this.executeCommandLine(cmd, { depth: 0 });
            }
          }
        } finally {
          this.actionFiringDepth -= 1;
        }
      }

      clearOutput() {
        this.renderQueue = [];
        this.outputEl.textContent = "";
        this.outputEndsWithNewline = true;
        this.trailingBlankLineCount = 0;
        this.hasRenderedOutput = false;
        this.focusInput();
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      window.mudprotoWebClient = new MudProtoWebClient();
    });
  </script>
</body>
</html>
