<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MudProto Web Client</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #090909;
      --panel-2: #101010;
      --border: #262626;
      --text: #f2f2f2;
      --muted: #9a9a9a;
      --accent: #61d6d6;
      --ok: #16c60c;
      --warn: #f9f1a5;
      --err: #e74856;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
    }

    body {
      padding: 14px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      height: calc(100vh - 28px);
      max-height: calc(100vh - 28px);
      overflow: hidden;
    }

    .toolbar,
    .inputbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .status {
      margin-left: auto;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .status.connected {
      color: var(--ok);
      border-color: #174d15;
    }

    .status.connecting {
      color: var(--warn);
      border-color: #5d5200;
    }

    .status.disconnected {
      color: var(--err);
      border-color: #5d1d24;
    }

    label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    input[type="text"] {
      background: #050505;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(97, 214, 214, 0.25);
    }

    #serverUri {
      min-width: 0;
      flex: 1 1 auto;
    }

    button {
      background: #151515;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #1e1e1e;
    }

    #helpBtn,
    #menuBtn {
      font-size: 1.1rem;
      line-height: 1;
      padding-left: 14px;
      padding-right: 14px;
    }

    #helpBtn {
      font-weight: 700;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.72);
    }

    .modal.hidden {
      display: none;
    }

    .modal-panel {
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
    }

    #helpModal .modal-panel {
      width: min(460px, 100%);
      transition: width 0.15s ease;
    }

    #helpModal .modal-panel.help-wide {
      width: min(760px, 100%);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
    }

    .modal-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .modal-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .modal-section-title {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-placeholder {
      min-height: 116px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0c0c0c;
      color: var(--muted);
    }

    .help-text {
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .help-view.hidden {
      display: none;
    }

    #helpHomeView,
    #helpDetailView {
      display: block;
      padding: 18px 20px 20px;
    }

    #helpHomeView.hidden,
    #helpDetailView.hidden {
      display: none;
    }

    #helpHomeView .modal-section,
    #helpDetailView .modal-section {
      width: 100%;
      max-width: 100%;
    }

    .help-home-layout,
    .help-detail-layout {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      margin: 0 auto;
    }

    .help-home-layout {
      width: min(300px, 100%);
      align-items: center;
      text-align: center;
      margin: 0 auto;
    }

    .help-home-layout button {
      width: min(280px, 100%);
    }

    .help-detail-layout {
      width: 100%;
      max-width: 100%;
      align-items: stretch;
    }

    .help-nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      width: 100%;
    }

    .help-detail-card {
      width: 100%;
      height: 420px;
      overflow-x: auto;
      overflow-y: auto;
      display: block;
      scrollbar-color: #3a3a3a #070707;
    }

    .help-detail-card::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .help-detail-card::-webkit-scrollbar-track {
      background: #070707;
    }

    .help-detail-card::-webkit-scrollbar-thumb {
      background: #323232;
      border-radius: 999px;
      border: 2px solid #070707;
    }

    .help-detail-card::-webkit-scrollbar-thumb:hover {
      background: #454545;
    }

    .help-detail-card::-webkit-scrollbar-corner {
      background: #070707;
    }

    #helpBackBtn {
      padding: 6px 10px;
      font-size: 1rem;
      font-weight: 700;
      min-width: 40px;
    }

    .output-wrap {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      min-height: 0;
      max-height: 100%;
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 700;
    }

    #output {
      flex: 1 1 auto;
      overflow: auto;
      scrollbar-gutter: stable;
      scrollbar-color: #3a3a3a #070707;
      overscroll-behavior: contain;
      contain: content;
      padding: 16px 72px 18px 18px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.35;
      min-height: 320px;
    }

    #output::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    #output::-webkit-scrollbar-track {
      background: #070707;
    }

    #output::-webkit-scrollbar-thumb {
      background: #323232;
      border-radius: 999px;
      border: 2px solid #070707;
    }

    #output::-webkit-scrollbar-thumb:hover {
      background: #454545;
    }

    #output::-webkit-scrollbar-corner {
      background: #070707;
    }

    .output-group {
      display: inline;
    }

    .inputbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt-prefix {
      color: var(--ok);
      font-weight: 700;
      padding-left: 2px;
    }

    #commandInput {
      flex: 1 1 auto;
      min-width: 0;
      background: transparent;
      border: none;
      padding: 4px 0;
    }

    #commandInput:focus {
      box-shadow: none;
      border: none;
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <label for="serverUri">Server</label>
      <input id="serverUri" type="text" spellcheck="false" aria-label="Server URI" />
      <button id="connectionBtn" type="button">Connect</button>
      <button id="helpBtn" type="button" aria-label="Open help" title="Help">?</button>
      <button id="menuBtn" type="button" aria-label="Open settings menu" title="Settings">☰</button>
      <div id="status" class="status disconnected">Disconnected</div>
    </div>

    <input id="configFileInput" type="file" accept=".json,application/json" hidden />

    <div id="settingsModal" class="modal hidden" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="modal-header">
          <span id="settingsTitle">Client Settings</span>
          <button id="closeSettingsBtn" type="button" aria-label="Close settings">×</button>
        </div>
        <div class="modal-body">
          <div class="modal-section">
            <div class="modal-section-title">Configuration</div>
            <button id="saveConfigBtn" type="button">Save Config</button>
            <button id="saveConfigAsBtn" type="button">Save Config As...</button>
            <button id="loadConfigBtn" type="button">Load Config</button>
            <button id="loadNewConfigBtn" type="button">Load New Config</button>
          </div>
          <div class="modal-section">
            <div class="modal-section-title">Customization</div>
            <button id="aliasesBtn" type="button">Aliases</button>
            <button id="keyBindingsBtn" type="button">Key Bindings</button>
          </div>
        </div>
      </div>
    </div>

    <div id="helpModal" class="modal hidden" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
        <div class="modal-header">
          <span id="helpTitle">Command Help</span>
          <button id="closeHelpBtn" type="button" aria-label="Close help">×</button>
        </div>
        <div id="helpHomeView" class="modal-body help-view">
          <div class="modal-section help-home-layout">
            <div class="modal-section-title">Help Sections</div>
            <button id="openAliasesHelpBtn" type="button">Open Aliases Help</button>
            <button id="openBindsHelpBtn" type="button">Open Binds Help</button>
          </div>
        </div>
        <div id="helpDetailView" class="modal-body help-view hidden">
          <div class="modal-section help-detail-layout">
            <div class="help-nav-row">
              <button id="helpBackBtn" type="button" aria-label="Back to help sections">←</button>
              <div id="helpDetailTitle" class="modal-section-title">Help Detail</div>
            </div>
            <div id="helpDetailContent" class="modal-placeholder help-text help-detail-card"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="output-wrap">
      <div class="output-header">
        <span>MudProto Web Client</span>
      </div>
      <div id="output" aria-live="polite"></div>
    </div>

    <form id="inputForm" class="inputbar" autocomplete="off">
      <div class="prompt-prefix">&gt;</div>
      <input id="commandInput" type="text" spellcheck="false" aria-label="Command input" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const COLOR_MAP = {
      black: "#000000",
      red: "#c50f1f",
      green: "#13a10e",
      yellow: "#c19c00",
      orange: "#ff8c00",
      blue: "#0037da",
      magenta: "#881798",
      cyan: "#3a96dd",
      white: "#cccccc",
      bright_black: "#767676",
      bright_red: "#e74856",
      bright_green: "#16c60c",
      bright_yellow: "#f9f1a5",
      bright_blue: "#3b78ff",
      bright_magenta: "#b4009e",
      bright_cyan: "#61d6d6",
      bright_white: "#f2f2f2",
    };

    const RECONNECT_INTERVAL_MS = 5000;
    const DEFAULT_SERVER_URI = "wss://williamsmithe.com:8765/";
    const MAX_OUTPUT_GROUPS = 400;
    const MAX_RENDER_QUEUE_GROUPS = 100;
    const MAX_COMMAND_HISTORY = 100;
    const MAX_ALIAS_EXPANSION_DEPTH = 8;
    const DEFAULT_KEY_BINDINGS = {
      numpad2: "south",
      numpad4: "west",
      numpad6: "east",
      numpad8: "north",
      numpad_add: "down",
      numpad_subtract: "up",
    };
    const BIND_KEY_SYNONYMS = {
      escape: "esc",
      pgup: "pageup",
      pgdn: "pagedown",
      del: "delete",
      ins: "insert",
      arrowup: "up",
      arrowdown: "down",
      arrowleft: "left",
      arrowright: "right",
    };
    const SUPPORTED_BIND_KEYS = new Set([
      "f1", "f2", "f3", "f4", "f5", "f6", "f7", "f8", "f9", "f10", "f11", "f12",
      "backspace", "tab", "esc", "pageup", "pagedown", "end", "home", "left", "right", "up", "down",
      "insert", "delete", "numpad0", "numpad1", "numpad2", "numpad3", "numpad4", "numpad5", "numpad6",
      "numpad7", "numpad8", "numpad9", "numpad_multiply", "numpad_add", "numpad_subtract",
      "numpad_decimal", "numpad_divide", "numlock", "scrolllock",
    ]);

    function utcNowIso() {
      return new Date().toISOString();
    }

    function buildInputMessage(text) {
      return {
        type: "input",
        source: "mudproto_client_web",
        timestamp: utcNowIso(),
        payload: {
          text,
        },
      };
    }

    function extractLines(payload, key) {
      const candidate = payload && typeof payload === "object" ? payload[key] : null;
      if (!Array.isArray(candidate)) {
        return [];
      }
      return candidate.filter((line) => Array.isArray(line));
    }

    function splitCommandLine(commandLine) {
      const segments = [];
      let current = "";
      let quote = null;
      let escaped = false;

      for (const char of String(commandLine || "")) {
        if (escaped) {
          current += char;
          escaped = false;
          continue;
        }

        if (char === "\\") {
          current += char;
          escaped = true;
          continue;
        }

        if (quote) {
          if (char === quote) {
            quote = null;
          }
          current += char;
          continue;
        }

        if (char === '"' || char === "'") {
          quote = char;
          current += char;
          continue;
        }

        if (char === ";") {
          const segment = current.trim();
          if (segment) {
            segments.push(segment);
          }
          current = "";
          continue;
        }

        current += char;
      }

      if (quote) {
        throw new Error("Malformed input: unmatched quote.");
      }

      const finalSegment = current.trim();
      if (finalSegment) {
        segments.push(finalSegment);
      }
      return segments;
    }

    function splitLeadingToken(commandText) {
      const trimmed = String(commandText || "").trim();
      if (!trimmed) {
        return { commandName: "", remainder: "" };
      }

      if (trimmed.startsWith("{")) {
        const close = trimmed.indexOf("}");
        if (close !== -1) {
          return {
            commandName: trimmed.slice(1, close).trim(),
            remainder: trimmed.slice(close + 1).trim(),
          };
        }
      }

      const firstSpace = trimmed.search(/\s/);
      if (firstSpace === -1) {
        return { commandName: trimmed, remainder: "" };
      }

      return {
        commandName: trimmed.slice(0, firstSpace),
        remainder: trimmed.slice(firstSpace).trim(),
      };
    }

    function parseCommandWords(commandText) {
      const words = [];
      let current = "";
      let quote = null;
      let escaped = false;

      for (const char of String(commandText || "").trim()) {
        if (escaped) {
          current += char;
          escaped = false;
          continue;
        }

        if (char === "\\") {
          escaped = true;
          continue;
        }

        if (quote) {
          if (char === quote) {
            quote = null;
          } else {
            current += char;
          }
          continue;
        }

        if (char === '"' || char === "'") {
          quote = char;
          continue;
        }

        if (/\s/.test(char)) {
          if (current) {
            words.push(current);
            current = "";
          }
          continue;
        }

        current += char;
      }

      if (quote) {
        throw new Error("Malformed input: unmatched quote.");
      }

      if (escaped) {
        current += "\\";
      }

      if (current) {
        words.push(current);
      }

      return words;
    }

    function wildcardToRegExp(pattern) {
      const escaped = String(pattern || "")
        .trim()
        .toLowerCase()
        .replace(/[.+?^${}()|[\]\\]/g, "\\$&")
        .replace(/\*/g, ".*");
      return new RegExp(`^${escaped}$`, "i");
    }

    function normalizeBindKeyName(keyName) {
      const raw = String(keyName || "").trim().toLowerCase().replace(/\s+/g, "");
      if (!raw) {
        return "";
      }
      const normalized = BIND_KEY_SYNONYMS[raw] || raw;
      return SUPPORTED_BIND_KEYS.has(normalized) ? normalized : "";
    }

    function bindEventKeyName(event) {
      const code = String(event && event.code ? event.code : "");
      const codeMap = {
        NumpadMultiply: "numpad_multiply",
        NumpadAdd: "numpad_add",
        NumpadSubtract: "numpad_subtract",
        NumpadDecimal: "numpad_decimal",
        NumpadDivide: "numpad_divide",
      };

      if (/^Numpad\d$/.test(code)) {
        return `numpad${code.slice(-1)}`;
      }
      if (codeMap[code]) {
        return codeMap[code];
      }
      return normalizeBindKeyName(event && event.key ? event.key : "");
    }

    function renderDisplayMessage(client, message) {
      client.renderDisplayMessage(message);
    }

    class MudProtoWebClient {
      constructor() {
        this.websocket = null;
        this.connecting = false;
        this.closing = false;
        this.reconnectTimer = null;
        this.commandHistory = [];
        this.historyIndex = null;
        this.historyStash = "";
        this.outputEndsWithNewline = true;
        this.trailingBlankLineCount = 0;
        this.hasRenderedOutput = false;
        this.renderQueue = [];
        this.renderScheduled = false;
        this.autoScrollThresholdPx = 24;
        this.pendingLoadMode = "merge";

        this.outputEl = document.getElementById("output");
        this.inputEl = document.getElementById("commandInput");
        this.inputFormEl = document.getElementById("inputForm");
        this.statusEl = document.getElementById("status");
        this.serverUriEl = document.getElementById("serverUri");
        this.connectionBtn = document.getElementById("connectionBtn");
        this.helpBtn = document.getElementById("helpBtn");
        this.menuBtn = document.getElementById("menuBtn");
        this.settingsModal = document.getElementById("settingsModal");
        this.helpModal = document.getElementById("helpModal");
        this.helpHomeView = document.getElementById("helpHomeView");
        this.helpDetailView = document.getElementById("helpDetailView");
        this.helpDetailTitle = document.getElementById("helpDetailTitle");
        this.helpDetailContent = document.getElementById("helpDetailContent");
        this.closeSettingsBtn = document.getElementById("closeSettingsBtn");
        this.closeHelpBtn = document.getElementById("closeHelpBtn");
        this.helpBackBtn = document.getElementById("helpBackBtn");
        this.openAliasesHelpBtn = document.getElementById("openAliasesHelpBtn");
        this.openBindsHelpBtn = document.getElementById("openBindsHelpBtn");
        this.saveConfigBtn = document.getElementById("saveConfigBtn");
        this.saveConfigAsBtn = document.getElementById("saveConfigAsBtn");
        this.loadConfigBtn = document.getElementById("loadConfigBtn");
        this.loadNewConfigBtn = document.getElementById("loadNewConfigBtn");
        this.aliasesBtn = document.getElementById("aliasesBtn");
        this.keyBindingsBtn = document.getElementById("keyBindingsBtn");
        this.configFileInput = document.getElementById("configFileInput");
        this.aliases = {};
        this.keyBindings = {};

        const storedConfig = this.loadStoredClientConfig();
        this.aliases = storedConfig.aliases || {};
        this.keyBindings = storedConfig.key_bindings || {};
        this.serverUriEl.value = storedConfig.server_uri || window.localStorage.getItem("mudproto.serverUri") || DEFAULT_SERVER_URI;

        this.bindEvents();
        this.appendSystemMessage(`Connecting to ${this.serverUriEl.value}...`, "bright_cyan");
        this.connect();
      }

      bindEvents() {
        this.inputFormEl.addEventListener("submit", (event) => this.onSubmit(event));
        this.inputEl.addEventListener("keydown", (event) => this.onHistoryKey(event));
        this.connectionBtn.addEventListener("click", () => this.toggleConnection());
        this.helpBtn.addEventListener("click", () => this.openHelp());
        this.menuBtn.addEventListener("click", () => this.openSettings());
        this.closeSettingsBtn.addEventListener("click", () => this.closeSettings());
        this.closeHelpBtn.addEventListener("click", () => this.closeHelp());
        this.helpBackBtn.addEventListener("click", () => this.showHelpHome());
        this.openAliasesHelpBtn.addEventListener("click", () => this.showHelpSection("aliases"));
        this.openBindsHelpBtn.addEventListener("click", () => this.showHelpSection("binds"));
        this.saveConfigBtn.addEventListener("click", () => this.saveConfig());
        this.saveConfigAsBtn.addEventListener("click", () => this.saveConfigAs());
        this.loadConfigBtn.addEventListener("click", () => this.requestLoadConfig("merge"));
        this.loadNewConfigBtn.addEventListener("click", () => this.requestLoadNewConfig());
        this.aliasesBtn.addEventListener("click", () => this.openAliasesModal());
        this.keyBindingsBtn.addEventListener("click", () => this.openKeyBindingsModal());
        this.configFileInput.addEventListener("change", (event) => this.loadConfigFromFile(event));

        this.settingsModal.addEventListener("click", (event) => {
          if (event.target === this.settingsModal) {
            this.closeSettings();
          }
        });

        this.helpModal.addEventListener("click", (event) => {
          if (event.target === this.helpModal) {
            this.closeHelp();
          }
        });

        document.addEventListener("keydown", (event) => this.onGlobalKeyDown(event));
        window.addEventListener("beforeunload", () => this.disconnect(true));
      }

      normalizeStringMap(raw, normalizer = (key) => String(key).trim().toLowerCase()) {
        if (!raw || typeof raw !== "object") {
          return {};
        }

        const normalized = {};
        Object.entries(raw).forEach(([key, value]) => {
          const normalizedKey = normalizer(key);
          const expansion = String(value || "").trim();
          if (normalizedKey && expansion) {
            normalized[normalizedKey] = expansion;
          }
        });

        return Object.fromEntries(Object.entries(normalized).sort(([left], [right]) => left.localeCompare(right)));
      }

      normalizeClientConfig(raw) {
        const data = raw && typeof raw === "object" ? raw : {};
        const aliases = this.normalizeStringMap(data.aliases, (key) => String(key).trim().toLowerCase());
        const configuredKeyBindings = this.normalizeStringMap(data.key_bindings, (key) => normalizeBindKeyName(key));
        const keyBindings = Object.keys(configuredKeyBindings).length ? configuredKeyBindings : { ...DEFAULT_KEY_BINDINGS };

        return {
          version: 1,
          server_uri: typeof data.server_uri === "string" && data.server_uri.trim() ? data.server_uri.trim() : DEFAULT_SERVER_URI,
          aliases,
          key_bindings: keyBindings,
        };
      }

      loadStoredClientConfig() {
        try {
          const raw = window.localStorage.getItem("mudproto.clientConfig");
          if (!raw) {
            return this.normalizeClientConfig({});
          }
          return this.normalizeClientConfig(JSON.parse(raw));
        } catch {
          return this.normalizeClientConfig({});
        }
      }

      buildClientConfig() {
        return this.normalizeClientConfig({
          version: 1,
          server_uri: this.serverUriEl.value.trim() || DEFAULT_SERVER_URI,
          aliases: this.aliases,
          key_bindings: this.keyBindings,
        });
      }

      persistClientConfig() {
        const config = this.buildClientConfig();
        this.aliases = config.aliases;
        this.keyBindings = config.key_bindings;
        window.localStorage.setItem("mudproto.serverUri", config.server_uri);
        window.localStorage.setItem("mudproto.clientConfig", JSON.stringify(config));
        return config;
      }

      mergeClientConfig(currentConfig, incomingConfig) {
        const current = this.normalizeClientConfig(currentConfig || {});
        const incoming = incomingConfig && typeof incomingConfig === "object" ? incomingConfig : {};
        const incomingAliases = this.normalizeStringMap(incoming.aliases, (key) => String(key).trim().toLowerCase());
        const incomingKeyBindings = this.normalizeStringMap(incoming.key_bindings, (key) => normalizeBindKeyName(key));

        return this.normalizeClientConfig({
          version: 1,
          server_uri: typeof incoming.server_uri === "string" && incoming.server_uri.trim() ? incoming.server_uri.trim() : current.server_uri,
          aliases: {
            ...current.aliases,
            ...incomingAliases,
          },
          key_bindings: {
            ...current.key_bindings,
            ...incomingKeyBindings,
          },
        });
      }

      currentUri() {
        const uri = this.serverUriEl.value.trim() || DEFAULT_SERVER_URI;
        this.serverUriEl.value = uri;
        this.persistClientConfig();
        return uri;
      }

      openSettings() {
        this.closeHelp();
        this.settingsModal.classList.remove("hidden");
        this.settingsModal.setAttribute("aria-hidden", "false");
      }

      closeSettings() {
        this.settingsModal.classList.add("hidden");
        this.settingsModal.setAttribute("aria-hidden", "true");
      }

      showHelpHome() {
        this.helpHomeView.classList.remove("hidden");
        this.helpDetailView.classList.add("hidden");
        this.helpModal.querySelector(".modal-panel").classList.remove("help-wide");
      }

      showHelpSection(sectionName) {

              "",

              "- {braces} group multi-word names or expansions as one token",
              "- #alias {l n} {look north}  creates alias 'l n' = 'look north'",
              "- #alias l {look north}      creates alias 'l' = 'look north'",

              "#bind f2 flee",

              "#bind pageup scan",
              "#bind numpad8 north",

              "f2-f12  (f1 is reserved and cannot be rebound)",

              "numpad0-numpad9",

              "escape → esc       pgup → pageup      pgdn → pagedown",

        const selected = helpContent[sectionName] || helpContent.aliases;
        this.helpDetailTitle.textContent = selected.title;
        this.helpDetailContent.textContent = selected.body;

      openHelp(sectionName = "") {
        this.closeSettings();
        this.helpModal.classList.remove("hidden");
        this.helpModal.setAttribute("aria-hidden", "false");
        if (sectionName) {
          this.showHelpSection(sectionName);
          return;
        }
        this.showHelpHome();
      }

      closeHelp() {
        this.helpModal.classList.add("hidden");
        this.helpModal.setAttribute("aria-hidden", "true");
        this.showHelpHome();
      }

      saveConfig() {
        this.downloadClientConfig("mudproto-client-config.json");
      }

      saveConfigAs() {
        const suggestedName = window.prompt("Save config as...", "mudproto-client-config.json");
        if (suggestedName === null) {
          return;
        }

        let fileName = suggestedName.trim() || "mudproto-client-config.json";
        if (!fileName.toLowerCase().endsWith(".json")) {
          fileName += ".json";
        }
        this.downloadClientConfig(fileName);
      }

      downloadClientConfig(fileName) {
        const config = this.persistClientConfig();
        const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.URL.revokeObjectURL(url);
        this.appendSystemMessage(`Saved client config as ${fileName}.`, "bright_green");
        this.closeSettings();
      }

      requestLoadConfig(loadMode = "merge") {
        this.pendingLoadMode = loadMode;
        this.configFileInput.value = "";
        this.configFileInput.click();
      }

      requestLoadNewConfig() {
        this.pendingLoadMode = "replace";
        this.requestLoadConfig("replace");
      }

      loadConfigFromFile(event) {
        const file = event && event.target && event.target.files ? event.target.files[0] : null;
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            const mode = this.pendingLoadMode === "replace" ? "replace" : "merge";
            const currentConfig = this.buildClientConfig();
            const nextConfig = mode === "replace"
              ? this.normalizeClientConfig(parsed)
              : this.mergeClientConfig(currentConfig, parsed);

            this.aliases = nextConfig.aliases || {};
            this.keyBindings = nextConfig.key_bindings || {};
            this.serverUriEl.value = nextConfig.server_uri;
            this.persistClientConfig();
            this.appendSystemMessage(
              mode === "replace"
                ? "Loaded new client config. Reconnect to apply any server change."
                : "Loaded client config and merged it into current settings. Reconnect to apply any server change.",
              "bright_green"
            );
            this.closeSettings();
          } catch {
            this.appendSystemMessage("Failed to load client config.", "bright_red");
          } finally {
            this.pendingLoadMode = "merge";
          }
        };
        reader.readAsText(file);
      }

      onGlobalKeyDown(event) {
        if (event.defaultPrevented) {
          return;
        }

        if (event.key === "Escape") {
          if (this.helpModal && !this.helpModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeHelp();
            return;
          }
          if (this.settingsModal && !this.settingsModal.classList.contains("hidden")) {
            event.preventDefault();
            this.closeSettings();
            return;
          }
        }

        if (this.tryExecuteBoundKey(event)) {
          return;
        }

        const active = document.activeElement;
        if (active === this.inputEl || active === this.serverUriEl) {
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          this.inputEl.focus();
          return;
        }

        if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
          this.inputEl.focus();
          this.inputEl.value += event.key;
          event.preventDefault();
        }
      }

      tryExecuteBoundKey(event) {
        if (event.ctrlKey || event.metaKey || event.altKey) {
          return false;
        }
        if ((this.helpModal && !this.helpModal.classList.contains("hidden")) || (this.settingsModal && !this.settingsModal.classList.contains("hidden"))) {
          return false;
        }

        const normalizedKey = bindEventKeyName(event);
        if (!normalizedKey || normalizedKey === "f1") {
          return false;
        }

        const expansion = this.keyBindings[normalizedKey];
        if (!expansion) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        this.executeCommandLine(expansion, { depth: 0 });
        return true;
      }

      collectReferencedAliasPosition(template) {
        const matches = String(template || "").match(/%([1-9])/g) || [];
        return matches.reduce((highest, match) => Math.max(highest, Number(match.slice(1))), 0);
      }

      resolveAliasExpansion(template, remainderText) {
        const remainder = String(remainderText || "").trim();
        const args = parseCommandWords(remainder);
        const highestReferenced = this.collectReferencedAliasPosition(template);
        const remainingText = highestReferenced > 0 ? args.slice(highestReferenced).join(" ") : remainder;

        return String(template || "").replace(/%-([1-9])|%([0-9r])/gi, (_match, rangeToken, token) => {
          if (rangeToken) {
            const fromIndex = Number(rangeToken) - 1;
            return args.slice(fromIndex).join(" ");
          }
          const lowered = String(token).toLowerCase();
          if (lowered === "0") {
            return remainder;
          }
          if (lowered === "r") {
            return remainingText;
          }
          const index = Number(lowered) - 1;
          return index >= 0 ? (args[index] || "") : "";
        });
      }

      applyAliasExpansion(command, depth = 0) {
        const normalizedCommand = String(command || "").trim().toLowerCase();
        const aliasKeys = Object.keys(this.aliases).sort((a, b) => b.length - a.length);
        for (const aliasKey of aliasKeys) {
          if (!normalizedCommand.startsWith(aliasKey)) {
            continue;
          }
          const charAfter = command.charAt(aliasKey.length);
          if (charAfter && !/\s/.test(charAfter)) {
            continue;
          }
          const remainder = command.slice(aliasKey.length).trim();
          const expansion = this.aliases[aliasKey];
          if (depth >= MAX_ALIAS_EXPANSION_DEPTH) {
            this.appendSystemMessage("Alias recursion depth exceeded.", "bright_red");
            return true;
          }
          const resolved = this.resolveAliasExpansion(expansion, remainder);
          this.executeCommandLine(resolved, { depth: depth + 1 });
          return true;
        }
        return false;
      }

      matchingEntries(mapping, pattern = "") {
        const entries = Object.entries(mapping || {}).sort(([left], [right]) => left.localeCompare(right));
        const trimmedPattern = String(pattern || "").trim().toLowerCase();
        if (!trimmedPattern) {
          return entries;
        }
        const matcher = wildcardToRegExp(trimmedPattern);
        return entries.filter(([name]) => matcher.test(name));
      }

      showMappingList(mapping, pattern, emptyMessage, header) {
        const entries = this.matchingEntries(mapping, pattern);
        if (!entries.length) {
          this.appendSystemMessage(emptyMessage, "bright_yellow");
          return;
        }
        const lines = entries.map(([name, expansion]) => `  ${name} = ${expansion}`);
        this.appendSystemMessage(`${header}\n${lines.join("\n")}`, "bright_cyan");
      }

      handleAliasCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.showMappingList(this.aliases, "", "No aliases defined.", "-- Aliases --");
          return;
        }

        const { commandName: aliasName, remainder: expansion } = splitLeadingToken(remainder);
        if (!aliasName) {
          this.appendSystemMessage("Invalid alias name.", "bright_yellow");
          return;
        }

        if (!expansion) {
          this.showMappingList(this.aliases, aliasName, `No aliases match ${aliasName}.`, "-- Aliases --");
          return;
        }

        const normalizedName = String(aliasName).trim().toLowerCase();
        if (!normalizedName || normalizedName.startsWith("#")) {
          this.appendSystemMessage("Invalid alias name.", "bright_yellow");
          return;
        }

        this.aliases[normalizedName] = expansion.trim();
        this.persistClientConfig();
        this.appendSystemMessage(`${normalizedName} = ${this.aliases[normalizedName]}`, "bright_green");
      }

      handleUnaliasCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.appendSystemMessage("Usage: #unalias <name or pattern>", "bright_yellow");
          return;
        }
        const pattern = remainder.trim().toLowerCase();
        const removed = this.matchingEntries(this.aliases, pattern);
        if (!removed.length) {
          this.appendSystemMessage(`No aliases match ${pattern}.`, "bright_yellow");
          return;
        }
        for (const [name] of removed) {
          delete this.aliases[name];
        }
        this.persistClientConfig();
        this.appendSystemMessage(`Removed ${removed.length} alias${removed.length > 1 ? "es" : ""}: ${removed.map(([n]) => n).join(", ")}`, "bright_green");
      }

      handleBindCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.showMappingList(this.keyBindings, "", "No binds defined.", "-- Key Bindings --");
          return;
        }

        const { commandName: rawKeyName, remainder: expansion } = splitLeadingToken(remainder);
        if (!rawKeyName) {
          this.appendSystemMessage("Invalid key name.", "bright_yellow");
          return;
        }

        if (!expansion) {
          this.showMappingList(this.keyBindings, rawKeyName, `No binds match ${rawKeyName}.`, "-- Key Bindings --");
          return;
        }

        const normalizedKey = normalizeBindKeyName(rawKeyName);
        if (String(rawKeyName).trim().toLowerCase() === "f1") {
          this.appendSystemMessage("Reserved key: f1 cannot be rebound.", "bright_yellow");
          return;
        }
        if (!normalizedKey) {
          this.appendSystemMessage("Invalid key name.", "bright_yellow");
          return;
        }

        this.keyBindings[normalizedKey] = expansion.trim();
        this.persistClientConfig();
        this.appendSystemMessage(`${normalizedKey} = ${this.keyBindings[normalizedKey]}`, "bright_green");
      }

      handleUnbindCommand(commandText) {
        const { remainder } = splitLeadingToken(commandText);
        if (!remainder) {
          this.appendSystemMessage("Usage: #unbind <key or pattern>", "bright_yellow");
          return;
        }
        const pattern = remainder.trim().toLowerCase();
        const removed = this.matchingEntries(this.keyBindings, pattern);
        if (!removed.length) {
          this.appendSystemMessage(`No binds match ${pattern}.`, "bright_yellow");
          return;
        }
        for (const [name] of removed) {
          delete this.keyBindings[name];
        }
        this.persistClientConfig();
        this.appendSystemMessage(`Removed ${removed.length} bind${removed.length > 1 ? "s" : ""}: ${removed.map(([n]) => n).join(", ")}`, "bright_green");
      }

      executeCommandLine(rawText, { depth = 0 } = {}) {
        let segments;
        try {
          segments = splitCommandLine(rawText);
        } catch (error) {
          this.appendSystemMessage(error instanceof Error ? error.message : "Malformed input.", "bright_yellow");
          return;
        }

        for (let index = 0; index < segments.length; index += 1) {
          let commandText = segments[index];
          const { commandName, remainder } = splitLeadingToken(commandText);
          const localCommand = this.resolveLocalCommand(commandName);

          if ((localCommand === "#alias" || localCommand === "#bind") && index < segments.length - 1) {
            try {
              if (parseCommandWords(remainder).length >= 2) {
                commandText = segments.slice(index).join(";");
                this.dispatchCommand(commandText, depth);
                break;
              }
            } catch (error) {
              this.appendSystemMessage(error instanceof Error ? error.message : "Malformed input.", "bright_yellow");
              return;
            }
          }

          this.dispatchCommand(commandText, depth);
        }
      }

      resolveLocalCommand(input) {
        const commands = ["#alias", "#unalias", "#bind", "#unbind", "#clear", "#quit", "#help"];
        const lowered = String(input || "").trim().toLowerCase();
        if (!lowered.startsWith("#")) {
          return lowered;
        }
        const exact = commands.find((cmd) => cmd === lowered);
        if (exact) {
          return exact;
        }
        const matches = commands.filter((cmd) => cmd.startsWith(lowered));
        return matches.length === 1 ? matches[0] : lowered;
      }

      dispatchCommand(commandText, depth = 0) {
        const normalizedText = String(commandText || "").trim();
        if (!normalizedText) {
          return;
        }

        const { commandName } = splitLeadingToken(normalizedText);
        const localCommand = this.resolveLocalCommand(commandName);

        if (localCommand === "#clear") {
          this.clearOutput();
          return;
        }

        if (localCommand === "#quit") {
          this.appendSystemMessage("Disconnected locally.", "bright_yellow");
          this.disconnect(true);
          return;
        }

        if (localCommand === "#help") {
          this.openHelp();
          return;
        }

        if (localCommand === "#alias") {
          this.handleAliasCommand(commandText);
          return;
        }

        if (localCommand === "#bind") {
          this.handleBindCommand(commandText);
          return;
        }

        if (localCommand === "#unalias") {
          this.handleUnaliasCommand(commandText);
          return;
        }

        if (localCommand === "#unbind") {
          this.handleUnbindCommand(commandText);
          return;
        }

        if (localCommand.startsWith("#")) {
          this.appendSystemMessage("Unknown local command. Available: #alias, #unalias, #bind, #unbind, #clear, #quit, #help.", "bright_yellow");
          return;
        }

        if (this.applyAliasExpansion(normalizedText, depth)) {
          return;
        }

        this.sendText(normalizedText);
      }

      openAliasesModal() {
        this.openHelp("aliases");
      }

      openKeyBindingsModal() {
        this.openHelp("binds");
      }

      setStatus(text, state) {
        this.statusEl.textContent = text;
        this.statusEl.className = `status ${state}`;

        if (this.connectionBtn) {
          this.connectionBtn.textContent = state === "connected" || state === "connecting" ? "Disconnect" : "Connect";
        }
      }

      focusInput() {
        this.inputEl.focus();
        this.inputEl.selectionStart = this.inputEl.selectionEnd = this.inputEl.value.length;
      }

      toggleConnection() {
        if (this.websocket || this.connecting) {
          this.appendSystemMessage("Disconnected locally.", "bright_yellow");
          this.disconnect(true);
          return;
        }

        this.appendSystemMessage(`Connecting to ${this.currentUri()}...`, "bright_cyan");
        this.connect();
      }

      cancelReconnect() {
        if (this.reconnectTimer !== null) {
          window.clearTimeout(this.reconnectTimer);
          this.reconnectTimer = null;
        }
      }

      scheduleReconnect() {
        if (this.closing || this.websocket || this.connecting || this.reconnectTimer !== null) {
          return;
        }

        this.appendSystemMessage("Connection lost. Reconnecting in 5 seconds...", "bright_yellow");
        this.reconnectTimer = window.setTimeout(() => {
          this.reconnectTimer = null;
          this.appendSystemMessage(`Reconnecting to ${this.currentUri()}...`, "bright_cyan");
          this.connect();
        }, RECONNECT_INTERVAL_MS);
      }

      connect() {
        if (this.websocket || this.connecting) {
          return;
        }

        const uri = this.currentUri();
        this.closing = false;
        this.connecting = true;
        this.cancelReconnect();
        this.setStatus("Connecting", "connecting");

        try {
          const websocket = new WebSocket(uri);
          this.websocket = websocket;

          websocket.addEventListener("open", () => {
            this.connecting = false;
            this.setStatus("Connected", "connected");
            this.appendSystemMessage(`Connected to ${uri}`, "bright_green");
            this.focusInput();
          });

          websocket.addEventListener("message", (event) => {
            let response;
            try {
              response = JSON.parse(event.data);
            } catch {
              return;
            }

            if (response && response.type === "display") {
              renderDisplayMessage(this, response);
            }
          });

          websocket.addEventListener("close", () => {
            this.websocket = null;
            this.connecting = false;
            this.setStatus("Disconnected", "disconnected");
            if (!this.closing) {
              this.scheduleReconnect();
            }
          });

          websocket.addEventListener("error", () => {
            this.appendSystemMessage(
              "Connection error. If using WSS with a self-signed certificate, trust the certificate in your browser first.",
              "bright_red"
            );
          });
        } catch (error) {
          this.websocket = null;
          this.connecting = false;
          this.setStatus("Disconnected", "disconnected");
          this.appendSystemMessage(`Connection error: ${error}`, "bright_red");
        }
      }

      disconnect(manual = false) {
        this.cancelReconnect();
        this.closing = manual;

        if (this.websocket) {
          this.websocket.close();
          this.websocket = null;
        }

        this.connecting = false;
        this.setStatus("Disconnected", "disconnected");
      }

      sendText(text) {
        if (!this.websocket || this.websocket.readyState !== WebSocket.OPEN) {
          this.appendSystemMessage("Not connected to server.", "bright_red");
          return;
        }

        this.websocket.send(JSON.stringify(buildInputMessage(text)));
      }

      onSubmit(event) {
        event.preventDefault();

        const rawText = this.inputEl.value;
        const normalizedText = rawText.trim();
        this.inputEl.value = "";

        if (normalizedText) {
          this.recordHistory(normalizedText);
          this.executeCommandLine(rawText, { depth: 0 });
        }

        this.focusInput();
      }

      onHistoryKey(event) {
        if (this.tryExecuteBoundKey(event)) {
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          this.onHistoryUp();
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          this.onHistoryDown();
        }
      }

      onHistoryUp() {
        if (!this.commandHistory.length) {
          return;
        }

        if (this.historyIndex === null) {
          this.historyStash = this.inputEl.value;
          this.historyIndex = this.commandHistory.length - 1;
        } else if (this.historyIndex > 0) {
          this.historyIndex -= 1;
        }

        this.inputEl.value = this.commandHistory[this.historyIndex];
        this.focusInput();
      }

      onHistoryDown() {
        if (this.historyIndex === null) {
          return;
        }

        if (this.historyIndex < this.commandHistory.length - 1) {
          this.historyIndex += 1;
          this.inputEl.value = this.commandHistory[this.historyIndex];
        } else {
          this.historyIndex = null;
          this.inputEl.value = this.historyStash;
        }

        this.focusInput();
      }

      recordHistory(command) {
        if (!this.commandHistory.length || this.commandHistory[this.commandHistory.length - 1] !== command) {
          this.commandHistory.push(command);
          if (this.commandHistory.length > MAX_COMMAND_HISTORY) {
            this.commandHistory.splice(0, this.commandHistory.length - MAX_COMMAND_HISTORY);
          }
        }
        this.historyIndex = null;
        this.historyStash = "";
      }

      isNearBottom() {
        const remaining = this.outputEl.scrollHeight - this.outputEl.scrollTop - this.outputEl.clientHeight;
        return remaining <= this.autoScrollThresholdPx;
      }

      pruneOutput() {
        while (this.outputEl.childElementCount > MAX_OUTPUT_GROUPS) {
          this.outputEl.firstElementChild?.remove();
        }
      }

      appendPart(fragment, part) {
        if (!part || typeof part !== "object") {
          return;
        }

        const text = String(part.text || "");
        if (!text) {
          return;
        }

        const span = document.createElement("span");
        const fg = typeof part.fg === "string" ? part.fg : "bright_white";
        span.textContent = text;
        span.style.color = COLOR_MAP[fg] || COLOR_MAP.bright_white;
        if (part.bold) {
          span.style.fontWeight = "700";
        }
        fragment.appendChild(span);
      }

      flushRenderQueue() {
        this.renderScheduled = false;
        if (!this.renderQueue.length) {
          return;
        }

        const shouldStickToBottom = this.isNearBottom();
        const fragment = document.createDocumentFragment();

        while (this.renderQueue.length) {
          const queuedLines = this.renderQueue.shift();
          if (!Array.isArray(queuedLines) || !queuedLines.length) {
            continue;
          }

          const lines = this.normalizeBoundarySpacing(queuedLines);
          if (!lines.length) {
            continue;
          }

          const group = document.createElement("span");
          group.className = "output-group";

          if (!this.outputEndsWithNewline) {
            group.appendChild(document.createTextNode("\n"));
          }

          lines.forEach((line, index) => {
            if (index > 0) {
              group.appendChild(document.createTextNode("\n"));
            }
            if (!Array.isArray(line)) {
              return;
            }
            line.forEach((part) => this.appendPart(group, part));
          });

          this.outputEndsWithNewline = Array.isArray(lines[lines.length - 1]) && lines[lines.length - 1].length === 0;
          this.trailingBlankLineCount = this.countTrailingBlankLines(lines);
          this.hasRenderedOutput = true;
          fragment.appendChild(group);
        }

        this.outputEl.appendChild(fragment);
        this.pruneOutput();
        if (shouldStickToBottom) {
          this.outputEl.scrollTop = this.outputEl.scrollHeight;
        }
      }

      countLeadingBlankLines(lines) {
        let count = 0;
        while (count < lines.length && Array.isArray(lines[count]) && lines[count].length === 0) {
          count += 1;
        }
        return count;
      }

      countTrailingBlankLines(lines) {
        let count = 0;
        for (let index = lines.length - 1; index >= 0; index -= 1) {
          if (Array.isArray(lines[index]) && lines[index].length === 0) {
            count += 1;
            continue;
          }
          break;
        }
        return count;
      }

      normalizeBoundarySpacing(lines) {
        if (!Array.isArray(lines)) {
          return [];
        }

        const normalizedLines = [...lines];
        const leadingBlankCount = this.countLeadingBlankLines(lines);
        if (!leadingBlankCount) {
          return normalizedLines;
        }

        if (!this.hasRenderedOutput) {
          normalizedLines.splice(0, leadingBlankCount);
          return normalizedLines;
        }

        const desiredLeadingBlankCount = !this.outputEndsWithNewline || this.trailingBlankLineCount < 2 ? 1 : 0;
        if (leadingBlankCount > desiredLeadingBlankCount) {
          normalizedLines.splice(0, leadingBlankCount - desiredLeadingBlankCount);
        }

        return normalizedLines;
      }

      appendLineGroup(lines) {
        if (!Array.isArray(lines) || !lines.length) {
          return;
        }

        this.renderQueue.push(lines);
        if (this.renderQueue.length > MAX_RENDER_QUEUE_GROUPS) {
          this.renderQueue.splice(0, this.renderQueue.length - MAX_RENDER_QUEUE_GROUPS);
        }
        if (this.renderScheduled) {
          return;
        }

        this.renderScheduled = true;
        window.requestAnimationFrame(() => this.flushRenderQueue());
      }

      appendSystemMessage(text, fg = "bright_white") {
        const lines = [];
        if (!this.outputEndsWithNewline) {
          lines.push([]);
        }
        const textLines = String(text).split("\n");
        for (const textLine of textLines) {
          if (textLine === "") {
            lines.push([]);
          } else {
            lines.push([{ text: textLine, fg, bold: false }]);
          }
        }
        lines.push([]);
        lines.push([]);
        this.appendLineGroup(lines);
      }

      renderDisplayMessage(message) {
        const payload = message && typeof message === "object" ? message.payload : null;
        if (!payload || typeof payload !== "object") {
          return;
        }

        const lines = extractLines(payload, "lines");
        const promptLines = extractLines(payload, "prompt_lines");
        const renderedLines = [];

        if (lines.length) {
          renderedLines.push(...lines);
        }
        if (promptLines.length) {
          renderedLines.push(...promptLines);
        }
        if (renderedLines.length) {
          this.appendLineGroup(renderedLines);
        }
      }

      clearOutput() {
        this.renderQueue = [];
        this.outputEl.textContent = "";
        this.outputEndsWithNewline = true;
        this.trailingBlankLineCount = 0;
        this.hasRenderedOutput = false;
        this.focusInput();
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      window.mudprotoWebClient = new MudProtoWebClient();
    });
  </script>
</body>
</html>
